<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-Time Earthquake Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #1a1a2e; font-family: Arial, sans-serif; }

        .status-bar {
            background-color: #16213e;
            color: #00d4ff;
            padding: 8px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 45px;
            border-bottom: 2px solid #00d4ff;
        }
        .status-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .pulse-dot {
            width: 12px;
            height: 12px;
            background-color: #00ff88;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%   { transform: scale(1);   opacity: 1; }
            50%  { transform: scale(1.5); opacity: 0.5; }
            100% { transform: scale(1);   opacity: 1; }
        }
        .live-label { color: #00ff88; font-weight: bold; font-size: 13px; }
        .title { font-size: 14px; font-weight: bold; color: #00d4ff; }
        .status-right {
            display: flex;
            align-items: center;
            gap: 20px;
            font-size: 12px;
        }
        .countdown { color: #ffffff; font-size: 13px; }
        .countdown-num { color: #00d4ff; font-weight: bold; font-size: 15px; }
        .last-refresh { color: #aaaaaa; font-size: 12px; }
        .last-refresh-time { color: #ffffff; font-weight: bold; }
        .refresh-btn {
            background: transparent;
            border: 1px solid #00d4ff;
            color: #00d4ff;
            padding: 5px 14px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }
        .refresh-btn:hover { background: #00d4ff33; }

        .iframe-container {
        position: relative;
        width: 100%;
        height: calc(100vh - 45px);
    }

    iframe {
        position: absolute;
        width: 100%;
        height: 100%;
        border: none;
        top: 0;
        left: 0;
        transition: opacity 0.4s ease; /* optional smooth fade */
    }

    .active-frame {
        z-index: 2;
        opacity: 1;
    }

    .hidden-frame {
        z-index: 1;
        opacity: 0;
    }
    </style>
</head>
<body>

<div class="status-bar">
    <div class="status-left">
        <div class="pulse-dot"></div>
        <span class="live-label">● LIVE</span>
        <span class="title">🌍 Real-Time Earthquake Monitor</span>
    </div>
    <div class="status-right">
        <span class="last-refresh">Last refreshed: <span class="last-refresh-time" id="lastRefresh">loading...</span></span>
        <button class="refresh-btn" id="refreshBtn">⟳ Refresh Now</button>
    </div>
</div>

<div class="iframe-container">
    <iframe id="iframe1" class="active-frame"
        src="https://datastudio.google.com/embed/reporting/9aae5b49-36e9-4e06-8be9-fed15107fccc/page/WJvrF">
    </iframe>

    </div>
<script>
    var REFRESH_INTERVAL = 60;
   
    // Prevent overlapping refreshes
    var isRefreshing = false;

    // UI Elements
   
    var lastRefreshEl = document.getElementById('lastRefresh');
    var refreshBtn = document.getElementById('refreshBtn');

    // Dual iframe setup
    var iframe1 = document.getElementById('iframe1');
    var iframe2 = document.getElementById('iframe2');

    // Active/standby references
    var activeFrame = iframe1;
    var standbyFrame = iframe2;

    // Format current time
    function getTime() {
        var now = new Date();

        var h = now.getHours().toString().padStart(2, '0');
        var m = now.getMinutes().toString().padStart(2, '0');
        var s = now.getSeconds().toString().padStart(2, '0');

        return h + ':' + m + ':' + s;
    }

    // Dashboard refresh logic
  function refreshDashboard() {
    if (isRefreshing) return;
    isRefreshing = true;

    const frame = document.getElementById("dashboardFrame");

    const baseUrl =
        "https://datastudio.google.com/embed/reporting/9aae5b49-36e9-4e06-8be9-fed15107fccc/page/WJvrF";

    const newUrl = baseUrl + "?t=" + Date.now();

    // Create a hidden "preload swap"
    const tempFrame = document.createElement("iframe");
    tempFrame.style.position = "absolute";
    tempFrame.style.width = "100%";
    tempFrame.style.height = "100%";
    tempFrame.style.border = "none";
    tempFrame.style.opacity = "0";
    tempFrame.src = newUrl;

    document.querySelector(".iframe-container").appendChild(tempFrame);

    tempFrame.onload = function () {
        // instantly swap visibility (no blank screen)
        frame.src = newUrl;

        // remove temp loader
        tempFrame.remove();

        lastRefreshEl.textContent = getTime();
        isRefreshing = false;
    };
}

    // Manual refresh button
    refreshBtn.addEventListener('click', function () {
        refreshDashboard();
    });

    // Initial timestamp
    lastRefreshEl.textContent = getTime();

    // Countdown timer
    setInterval(function () {if (isRefreshing) return;

    refreshDashboard();

}, REFRESH_INTERVAL * 1000);

</script>
    
    
</body>
</html>
