<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-Time Earthquake Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #1a1a2e; font-family: Arial, sans-serif; }

        .status-bar {
            background-color: #16213e;
            color: #00d4ff;
            padding: 8px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 45px;
            border-bottom: 2px solid #00d4ff;
        }
        .status-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .pulse-dot {
            width: 12px;
            height: 12px;
            background-color: #00ff88;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%   { transform: scale(1);   opacity: 1; }
            50%  { transform: scale(1.5); opacity: 0.5; }
            100% { transform: scale(1);   opacity: 1; }
        }
        .live-label { color: #00ff88; font-weight: bold; font-size: 13px; }
        .title { font-size: 14px; font-weight: bold; color: #00d4ff; }
        .status-right {
            display: flex;
            align-items: center;
            gap: 20px;
            font-size: 12px;
        }
        .countdown { color: #ffffff; font-size: 13px; }
        .countdown-num { color: #00d4ff; font-weight: bold; font-size: 15px; }
        .last-refresh { color: #aaaaaa; font-size: 12px; }
        .last-refresh-time { color: #ffffff; font-weight: bold; }
        .refresh-btn {
            background: transparent;
            border: 1px solid #00d4ff;
            color: #00d4ff;
            padding: 5px 14px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }
        .refresh-btn:hover { background: #00d4ff33; }

        .iframe-container {
            width: 100%;
            height: calc(100vh - 45px);
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

<div class="status-bar">
    <div class="status-left">
        <div class="pulse-dot"></div>
        <span class="live-label">● LIVE</span>
        <span class="title">🌍 Real-Time Earthquake Monitor</span>
    </div>
    <div class="status-right">
        <span class="countdown">Next refresh in <span class="countdown-num" id="timer">60</span>s</span>
        <span class="last-refresh">Last refreshed: <span class="last-refresh-time" id="lastRefresh">loading...</span></span>
        <button class="refresh-btn" id="refreshBtn">⟳ Refresh Now</button>
    </div>
</div>

<div class="iframe-container">
    <iframe 
    loading = "lazy"
       id="dashboard"
        src="https://lookerstudio.google.com/embed/reporting/9aae5b49-36e9-4e06-8be9-fed15107fccc/page/WJvrF"
        allowfullscreen
        sandbox="allow-scripts allow-same-origin allow-popups">
            </iframe>
</div>

<script>
    var REFRESH_INTERVAL = 60;
    var countdown = REFRESH_INTERVAL;
    var timerEl = document.getElementById('timer');
    var lastRefreshEl = document.getElementById('lastRefresh');
    var iframeEl = document.getElementById('dashboard');
    var refreshBtn = document.getElementById('refreshBtn');
    var iframeSrc = iframeEl.src;
    iframeEl.onload = function() {
    console.log("Dashboard loaded successfully");
};

iframeEl.onerror = function() {
    console.log("Dashboard failed to load");
};

    function getTime() {
        var now = new Date();
        var h = now.getHours().toString().padStart(2, '0');
        var m = now.getMinutes().toString().padStart(2, '0');
        var s = now.getSeconds().toString().padStart(2, '0');
        return h + ':' + m + ':' + s;
    }

    function refreshDashboard() {
    const newSrc = iframeSrc.split('?')[0] + '?refresh=' + new Date().getTime();
    iframeEl.src = newSrc;

    lastRefreshEl.textContent = getTime();
    countdown = REFRESH_INTERVAL;
    timerEl.textContent = countdown;

    }

    refreshBtn.addEventListener('click', function() {
        refreshDashboard();
    });

    // Set initial time
    lastRefreshEl.textContent = getTime();

    // Countdown every second
    setInterval(function() {
        countdown = countdown - 1;
        timerEl.textContent = countdown;
        if (countdown <= 0) {
            refreshDashboard();
        }
    }, 1000);
</script>

</body>
</html>
